<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevHack Backend Test Login</title>
    <script async crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_dml0YWwtcGVnYXN1cy0xNS5jbGVyay5hY2NvdW50cy5kZXYk"
        src="https://vital-pegasus-15.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
        type="text/javascript"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            color: #eee;
        }

        .card {
            background: #16213e;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h2 {
            color: #6C47FF;
        }

        #token-area {
            width: 100%;
            background: #0f0f23;
            border: 1px solid #333;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            border-radius: 6px;
        }

        button {
            background: #6C47FF;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin: 10px 5px;
            transition: background 0.2s;
        }

        button:hover {
            background: #5538cc;
        }

        button.secondary {
            background: #444;
        }

        button.secondary:hover {
            background: #666;
        }

        #status {
            margin: 10px 0;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }

        .success {
            background: #1a4d1a;
            color: #4f4;
        }

        .error {
            background: #4d1a1a;
            color: #f44;
        }

        .loading {
            background: #4d4d1a;
            color: #ff4;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>🔐 Backend Test Console</h2>
        <div id="status" class="loading">Loading Clerk...</div>
        <div id="sign-in-button"></div>
        <div id="user-info" style="display: none;">
            <p>Welcome, <strong id="username"></strong>!</p>
            <p>Your Bearer Token:</p>
            <textarea id="token-area" rows="5" readonly></textarea>
            <div>
                <button onclick="copyToken()">📋 Copy Token</button>
                <button onclick="refreshToken()">🔄 Refresh</button>
                <button class="secondary" onclick="signOut()">Sign Out</button>
            </div>
        </div>
    </div>

    <script>
        let clerkLoaded = false;

        window.addEventListener("load", async function () {
            try {
                // Wait for Clerk to be available
                let attempts = 0;
                while (typeof Clerk === 'undefined' && attempts < 50) {
                    await new Promise(r => setTimeout(r, 100));
                    attempts++;
                }

                if (typeof Clerk === 'undefined') {
                    showStatus("Clerk failed to load. Check your internet.", "error");
                    return;
                }

                await Clerk.load();
                clerkLoaded = true;
                checkSession();
            } catch (err) {
                showStatus("Error: " + err.message, "error");
            }
        });

        async function checkSession() {
            if (!clerkLoaded) return;

            if (Clerk.user && Clerk.session) {
                document.getElementById("sign-in-button").style.display = "none";
                document.getElementById("user-info").style.display = "block";
                document.getElementById("username").innerText =
                    Clerk.user.firstName || Clerk.user.emailAddresses[0]?.emailAddress || "User";

                await refreshToken();
            } else {
                document.getElementById("sign-in-button").style.display = "block";
                document.getElementById("user-info").style.display = "none";
                showStatus("Please sign in to get your token.", "loading");

                const signInDiv = document.getElementById("sign-in-button");
                signInDiv.innerHTML = ""; // Clear any previous mount
                Clerk.mountSignIn(signInDiv, {
                    afterSignInUrl: window.location.href,
                    afterSignUpUrl: window.location.href,
                });
            }
        }

        async function refreshToken() {
            try {
                showStatus("Fetching token...", "loading");

                if (!Clerk.session) {
                    showStatus("No active session. Please sign in again.", "error");
                    return;
                }

                const token = await Clerk.session.getToken();

                if (token) {
                    document.getElementById("token-area").value = token;
                    showStatus("✅ Token ready! Expires in ~60 seconds.", "success");
                } else {
                    showStatus("Failed to get token. Try refreshing the page.", "error");
                }
            } catch (err) {
                showStatus("Token error: " + err.message, "error");
            }
        }

        function copyToken() {
            const tokenArea = document.getElementById("token-area");
            tokenArea.select();
            navigator.clipboard.writeText(tokenArea.value).then(() => {
                showStatus("✅ Copied to clipboard!", "success");
            }).catch(() => {
                document.execCommand("copy");
                showStatus("✅ Copied!", "success");
            });
        }

        function signOut() {
            Clerk.signOut().then(() => {
                window.location.reload();
            });
        }

        function showStatus(message, type) {
            const status = document.getElementById("status");
            status.innerText = message;
            status.className = type;
        }
    </script>
</body>

</html>
